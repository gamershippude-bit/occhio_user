name: Deploy to Google Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE: occhio-cloud
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Build and Deploy
      run: |
        # Build separado para debug
        gcloud builds submit --config=cloudbuild.yaml .
        
    - name: Get Service URL
      run: |
        gcloud run services describe $SERVICE --region $REGION --format="value(status.url)"

  cloudbuild:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Create cloudbuild.yaml
      run: |
        cat > cloudbuild.yaml << EOF
        steps:
          # Build da imagem
          - name: 'gcr.io/cloud-builders/docker'
            args: ['build', '-t', 'gcr.io/$PROJECT_ID/$SERVICE', '.']
            
          # Push da imagem
          - name: 'gcr.io/cloud-builders/docker'
            args: ['push', 'gcr.io/$PROJECT_ID/$SERVICE']
            
          # Deploy no Cloud Run
          - name: 'gcr.io/cloud-builders/gcloud'
            args: 
            - 'run'
            - 'deploy'
            - '$SERVICE'
            - '--image'
            - 'gcr.io/$PROJECT_ID/$SERVICE'
            - '--region'
            - '$REGION'
            - '--platform'
            - 'managed'
            - '--memory'
            - '2Gi'
            - '--cpu'
            - '2'
            - '--timeout'
            - '300'
            - '--allow-unauthenticated'
            - '--set-env-vars'
            - 'OPENAI_API_KEY=$OPENAI_API_KEY,DB_HOST=$DB_HOST,DB_USER=$DB_USER,DB_PASSWORD=$DB_PASSWORD,DB_NAME=$DB_NAME'
            
        images:
          - 'gcr.io/$PROJECT_ID/$SERVICE'
        EOF
        
    - name: Submit Build
      uses: google-github-actions/cloud-build@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        credentials: ${{ secrets.GCP_SA_KEY }}
        images: gcr.io/${{ secrets.GCP_PROJECT_ID }}/$SERVICE
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}