steps:
  # Build da imagem
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '--no-cache'
      - '-t'
      - 'gcr.io/$PROJECT_ID/occhio-cloud:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/occhio-cloud:latest'
      - '.'
    
  # Push da imagem  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/occhio-cloud']
    
  # Deploy no Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: 
    - 'run'
    - 'deploy'
    - 'occhio-cloud'
    - '--image'
    - 'gcr.io/$PROJECT_ID/occhio-cloud:$COMMIT_SHA'
    - '--region'
    - 'us-central1'
    - '--platform'
    - 'managed'
    - '--memory'
    - '2Gi'
    - '--cpu'
    - '2'
    - '--timeout'
    - '600'
    - '--max-instances'
    - '10'
    - '--min-instances'
    - '0'
    - '--concurrency'
    - '80'
    - '--allow-unauthenticated'
    - '--update-env-vars'
    - 'OPENAI_API_KEY=$_OPENAI_API_KEY,DB_HOST=$_DB_HOST,DB_USER=$_DB_USER,DB_PASSWORD=$_DB_PASSWORD,DB_NAME=$_DB_NAME,PYTHONUNBUFFERED=1'
    - '--revision-suffix'
    - 'v${SHORT_SHA}'

images:
  - 'gcr.io/$PROJECT_ID/occhio-cloud:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/occhio-cloud:latest'